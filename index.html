<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <title>My Bootstrap Page</title>
  </head>
  <body>
    <img src="your-image.jpg" alt="Image" class="img-fluid" />
    <h1>Bootstrap Heading 1</h1>
    <p class="lead">This is a lead paragraph for prominent text.</p>
    <button type="button" class="btn btn-primary">Primary Button</button>
    <button type="button" class="btn btn-secondary">Secondary Button</button>
    <button type="button" class="btn btn-danger">Danger Button</button>
    <button type="button" class="btn btn-success">
      Success Button <span class="badge bg-danger">Primary Badge</span>
    </button>
    <div class="container">
      <div class="row">
        <div class="col-12 col-md-6 col-lg-3">
          <h2>Column 1</h2>
          <p>This is the first column.</p>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
          <h2>Column 2</h2>
          <p>This is the second column.</p>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
          <h2>Column 3</h2>
          <p>This is the third column.</p>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
          <h2>Column 4</h2>
          <p>This is the fourth column.</p>
        </div>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
